name: generate contribution snake
on:
  schedule: [{ cron: "0 */12 * * *" }]   # every 12h
  workflow_dispatch:                      # run manually
  push: { branches: [main] }

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: denislibs
          outputs: |
            snake.svg?palette=github-dark&color_snake=58a6ff&color_dots=161b22,1f6feb,2f81f7,58a6ff,e3b341
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
